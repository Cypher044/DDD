version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: sunu-bus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sunu_bus
      POSTGRES_USER: sunu_bus
      POSTGRES_PASSWORD: sunu_bus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

